<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>ID Card Tenant - Green Pramuka Square</title>
  
  <!-- PWA Meta Tags -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#047857">
  <link rel="apple-touch-icon" href="https://i.ibb.co.com/kbrqvzD/Logo-GPS.png">
  
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex flex-col items-center justify-center min-h-screen p-3 sm:p-4">

  <!-- Halaman Pencarian ID -->
  <div id="search-box" class="w-full max-w-sm bg-white p-6 rounded-xl shadow-md mb-6 transition-all border-t-4 border-emerald-600">
    <div class="flex justify-center mb-4">
      <img src="https://i.ibb.co.com/kbrqvzD/Logo-GPS.png" alt="Logo Green Pramuka Square" class="h-12 object-contain">
    </div>
    <h2 class="text-lg font-bold text-center mb-4 text-gray-800">Portal Tenant GPS</h2>
    <input type="text" id="id-input" placeholder="Masukkan ID (cth: GPS-001)" class="w-full p-3 border border-gray-300 rounded-lg mb-3 focus:outline-none focus:ring-2 focus:ring-emerald-500 text-base uppercase">
    <button id="btn-cari" onclick="prosesCari()" class="w-full bg-emerald-600 text-white p-3 rounded-lg font-semibold hover:bg-emerald-700 transition active:scale-95 text-base shadow-sm">Buka ID Card</button>
    <p id="error-msg" class="text-red-500 text-sm mt-2 hidden text-center font-medium"></p>

    <div class="mt-5 pt-5 border-t border-gray-200 text-center">
      <p class="text-xs text-gray-500 mb-2">Belum terdaftar sebagai Tenant?</p>
      <button onclick="pindahTampilan('register-box')" class="w-full bg-gray-100 text-emerald-700 border border-emerald-200 p-2.5 rounded-lg font-semibold hover:bg-emerald-50 transition mb-4 active:scale-95 text-sm">Registrasi Tenant Baru</button>
      <button onclick="pindahTampilan('admin-login-box')" class="text-xs text-gray-400 hover:text-emerald-600 transition p-2">Akses Pengelola Mall</button>
    </div>
  </div>

  <!-- Tampilan ID Card Digital -->
  <div id="id-card" class="w-full max-w-sm bg-gradient-to-br from-teal-800 via-emerald-700 to-green-900 rounded-2xl shadow-2xl overflow-hidden text-white hidden relative border border-emerald-500/30">
    <div class="absolute bottom-0 left-0 -mb-4 -ml-4 w-32 h-32 bg-emerald-300 opacity-20 rounded-full blur-2xl"></div>
    <div class="absolute top-0 right-0 -mt-4 -mr-4 w-24 h-24 bg-yellow-300 opacity-10 rounded-full blur-xl"></div>

    <div class="px-4 py-5 flex flex-col items-center bg-white border-b-4 border-yellow-500 relative shadow-sm">
      <img src="https://i.ibb.co.com/kbrqvzD/Logo-GPS.png" alt="Logo Green Pramuka Square" class="h-14 sm:h-16 w-full object-contain mb-2">
      <p class="text-[10px] text-white uppercase tracking-widest bg-emerald-800 inline-block px-4 py-1 rounded-full shadow-md font-semibold">Green Pramuka Square Tenant</p>
    </div>

    <div class="p-5 sm:p-6 flex flex-col items-center relative z-10">
      <div class="w-24 h-24 sm:w-28 sm:h-28 bg-gray-100 rounded-full border-4 border-white overflow-hidden shadow-[0_0_15px_rgba(0,0,0,0.3)] mb-4 flex items-center justify-center relative">
        <img id="card-photo" src="" alt="Foto Karyawan" class="w-full h-full object-cover hidden absolute inset-0 z-10">
        <span id="photo-placeholder" class="text-gray-400 text-xs font-medium z-0">Tanpa Foto</span>
      </div>

      <h2 id="card-name" class="text-xl sm:text-2xl font-bold mb-1 text-center text-white drop-shadow-md leading-tight">Nama Karyawan</h2>
      <p id="card-role" class="text-yellow-400 font-semibold mb-4 tracking-wide text-xs sm:text-sm uppercase drop-shadow-sm">Jabatan</p>

      <div class="bg-black/30 w-full rounded-xl p-4 text-sm space-y-3 backdrop-blur-md border border-white/20 shadow-inner mb-5">
        <div class="flex justify-between items-center border-b border-white/10 pb-2">
          <span class="text-emerald-200 text-[11px] sm:text-xs uppercase tracking-wider font-medium">Nama Tenant</span>
          <span id="card-tenant" class="font-bold text-white text-right text-xs sm:text-sm">Nama Toko</span>
        </div>
        <div class="flex justify-between items-center border-b border-white/10 pb-2">
          <span class="text-emerald-200 text-[11px] sm:text-xs uppercase tracking-wider font-medium">ID Registrasi</span>
          <span id="card-id-number" class="font-bold text-yellow-200 font-mono tracking-widest text-xs sm:text-sm">GPS-000</span>
        </div>
        <div class="flex justify-between items-center pt-1">
          <span class="text-emerald-200 text-[11px] sm:text-xs uppercase tracking-wider font-medium">Status</span>
          <span id="card-status" class="font-bold px-3 py-1 rounded-md text-[10px] sm:text-xs tracking-wider shadow-sm">AKTIF</span>
        </div>
      </div>
      
      <button onclick="pindahTampilan('search-box')" class="mt-2 bg-white/10 hover:bg-white/20 text-white px-8 py-2.5 rounded-full text-sm font-semibold transition border border-white/30 shadow-sm active:scale-95">Tutup Kartu</button>
    </div>
  </div>

  <!-- Form Registrasi -->
  <div id="register-box" class="w-full max-w-sm bg-white p-5 sm:p-6 rounded-xl shadow-md mb-6 hidden border-t-4 border-emerald-600">
    <h2 class="text-xl font-bold text-center mb-4 text-gray-800">Registrasi Tenant GPS</h2>
    <form id="form-daftar" onsubmit="prosesDaftar(event)">
      <input type="text" id="reg-id" placeholder="Buat ID (cth: GPS-KASIR-01)" required class="w-full p-3 border border-gray-300 rounded-lg mb-3 focus:outline-none focus:ring-2 focus:ring-emerald-500 text-sm uppercase">
      <input type="text" id="reg-nama" placeholder="Nama Lengkap Karyawan" required class="w-full p-3 border border-gray-300 rounded-lg mb-3 focus:outline-none focus:ring-2 focus:ring-emerald-500 text-sm">
      <input type="text" id="reg-tenant" placeholder="Nama Tenant / Toko" required class="w-full p-3 border border-gray-300 rounded-lg mb-3 focus:outline-none focus:ring-2 focus:ring-emerald-500 text-sm">
      <input type="text" id="reg-jabatan" placeholder="Jabatan (cth: SPG / Kasir)" required class="w-full p-3 border border-gray-300 rounded-lg mb-3 focus:outline-none focus:ring-2 focus:ring-emerald-500 text-sm">
      <label class="block text-xs font-semibold text-gray-600 mb-1">Pas Foto Karyawan (Opsional):</label>
      <input type="file" id="reg-foto" accept="image/*" class="w-full p-2 border border-gray-300 rounded-lg mb-4 text-sm file:mr-4 file:py-1 file:px-2 file:rounded file:border-0 file:text-xs file:font-semibold file:bg-emerald-50 file:text-emerald-700 hover:file:bg-emerald-100">
      <button type="submit" id="btn-submit-reg" class="w-full bg-emerald-600 text-white p-3 rounded-lg font-semibold hover:bg-emerald-700 transition active:scale-95 text-sm shadow-sm">Kirim Pendaftaran</button>
      <button type="button" onclick="pindahTampilan('search-box')" class="w-full mt-2 bg-gray-100 text-gray-600 p-3 rounded-lg font-semibold hover:bg-gray-200 transition active:scale-95 text-sm">Batal & Kembali</button>
    </form>
    <div id="reg-msg-container" class="mt-4 p-3 rounded-lg hidden text-center text-sm font-medium"><p id="reg-msg"></p></div>
  </div>

  <!-- Dashboard Login & Admin ... (Sama seperti sebelumnya, menyesuaikan warna jika perlu) -->
  <div id="admin-login-box" class="w-full max-w-sm bg-white p-6 rounded-xl shadow-md mb-6 hidden border-t-4 border-gray-800">
    <h2 class="text-xl font-bold text-center mb-4 text-gray-800">Akses Pengelola GPS</h2>
    <input type="password" id="admin-password" placeholder="Masukkan Password Admin" class="w-full p-3 border border-gray-300 rounded-lg mb-3 focus:outline-none focus:ring-2 focus:ring-gray-800 text-center text-base">
    <button id="btn-login-admin" onclick="prosesLoginAdmin()" class="w-full bg-gray-800 text-white p-3 rounded-lg font-semibold hover:bg-gray-900 transition active:scale-95 text-sm">Masuk Dashboard</button>
    <button onclick="pindahTampilan('search-box')" class="w-full mt-2 bg-gray-100 text-gray-600 p-3 rounded-lg font-semibold hover:bg-gray-200 transition active:scale-95 text-sm">Kembali ke Beranda</button>
    <p id="admin-login-msg" class="text-red-500 text-sm mt-2 hidden text-center"></p>
  </div>

  <!-- ... (Bagian Admin Dashboard dan Edit Modal bisa menggunakan script Anda yang sudah ada dari [source: 1]) ... -->
  <!-- Letakkan sisa blok HTML dashboard di sini sesuai kode asli Anda -->

  <script>
    // URL WEB APP GAS
    const GAS_URL = "https://script.google.com/macros/s/AKfycbx06znKssD1JJxJxAbW9LGijNHTPzWD05odFnBk7F5bSH5T-bW0lIg7zUUYHRTLezvvHA/exec"; 

    // Registrasi Service Worker untuk PWA
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {

          .then(reg => console.log('Service Worker berhasil didaftarkan:', reg.scope))
          .catch(err => console.error('Pendaftaran Service Worker gagal:', err));
      });

    // Sisa fungsi JavaScript Anda (fetchGAS, pindahTampilan, dll dari kode sebelumnya)
    // ... [Salin semua blok script dari file asli Anda mulai baris 108 sampai akhir file HTML] ...
  </script>
</body>
</html>
